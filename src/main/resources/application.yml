server:
  port: 8080
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/agentpluginhub?useSSL=false&serverTimezone=UTC&characterEncoding=utf8}
    username: ${DB_USER:app}
    password: ${DB_PASSWORD:app}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  security:
    oauth2:
      client:
        registration:
          company:
            client-id: ${OIDC_CLIENT_ID:changeme}
            client-secret: ${OIDC_CLIENT_SECRET:changeme}
            scope: [openid, profile, email]
            provider: company
        provider:
          company:
            issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8081/realms/agent-plugin-hub}
app:
  # M1 制品存储改 S3/MinIO(Task 3 接);保留本地目录用于 dev/部分测试
  artifacts-dir: ./artifacts
  storage:
    type: ${STORAGE_TYPE:s3}
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    bucket: ${S3_BUCKET:agent-plugin-hub}
    region: ${S3_REGION:us-east-1}
  security:
    bootstrap-admin-subject: ${BOOTSTRAP_ADMIN_SUBJECT:}
